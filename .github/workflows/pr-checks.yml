name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # Check PR title format
  pr-title-check:
    runs-on: ubuntu-latest
    steps:
    - name: Check PR title
      uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        types: |
          feat
          fix
          docs
          style
          refactor
          test
          chore
          ci
          perf
          build
          revert
        scopes: |
          core
          tools
          resources
          tests
          ci
          deps
        requireScope: false

  # Validate changed files
  changed-files:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
      with:
        files: |
          src/**/*.ts
          tests/**/*.ts
          package.json
          package-lock.json
          tsconfig.json

    - name: List changed files
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        echo "Changed files:"
        echo "${{ steps.changed-files.outputs.all_changed_files }}"

    - name: Setup Node.js
      if: steps.changed-files.outputs.any_changed == 'true'
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      if: steps.changed-files.outputs.any_changed == 'true'
      run: npm ci

    - name: Validate TypeScript files
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        # Run type check on changed TypeScript files
        if echo "${{ steps.changed-files.outputs.all_changed_files }}" | grep -q "\.ts$"; then
          echo "TypeScript files changed, running type check..."
          npm run build
        fi

    - name: Run tests for changed files
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        # Run related tests
        npm run test:unit

  # Check code quality
  code-quality:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linter with annotations
      run: |
        npm run lint 2>&1 | tee lint-results.txt
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "::error::Linting failed. Please fix the issues above."
          exit 1
        fi

    - name: Check formatting
      run: |
        npm run format -- --check || {
          echo "::error::Code formatting issues found. Run 'npm run format' to fix."
          exit 1
        }

  # Test coverage check
  coverage-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run coverage
      run: npm run test:coverage

    - name: Check coverage threshold
      run: |
        # Extract coverage percentage from Jest output
        COVERAGE=$(npm run test:coverage 2>&1 | grep -oP 'All files.*?(\d+\.\d+)' | grep -oP '\d+\.\d+' | head -1)
        echo "Coverage: ${COVERAGE}%"
        
        # Set minimum coverage threshold (55%)
        # TODO: Increase to 80% after adding tests for tools and resources
        THRESHOLD=55
        
        if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
          echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
          exit 1
        else
          echo "::notice::Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"
        fi

  # Dependency validation
  deps-validation:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Validate package-lock.json
      run: |
        if [ -f package-lock.json ]; then
          npm ci --frozen-lockfile
        else
          echo "::error::package-lock.json not found"
          exit 1
        fi

    - name: Check for unused dependencies
      run: |
        npx depcheck --ignores="@types/*,power-assert,@typescript-eslint/*,eslint,prettier,jest,ts-jest,ts-node" || {
          echo "::warning::Unused dependencies found. Consider removing them."
        }

    - name: Validate peer dependencies
      run: |
        npm ls --depth=0 2>&1 | grep -i "peer dep" && {
          echo "::error::Peer dependency issues found"
          exit 1
        } || {
          echo "::notice::All peer dependencies satisfied"
        }

  # Auto-fix for dependency updates
  auto-fix-deps:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'app/dependabot' ||
      github.event.pull_request.user.login == 'renovate[bot]' ||
      github.event.pull_request.user.login == 'renovate-bot'
    permissions:
      contents: write
      pull-requests: write
    steps:
    - name: Checkout PR
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: ${{ github.event.pull_request.head.ref }}

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Check peer dependency compatibility
      id: peer-check
      run: |
        if ! npm ci 2>&1 | tee /tmp/npm-ci-output.txt; then
          if grep -q "ERESOLVE" /tmp/npm-ci-output.txt; then
            echo "peer_conflict=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Peer dependency conflict detected. This PR may require manual intervention."
          else
            echo "peer_conflict=false" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "peer_conflict=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Auto-fix common issues
      if: steps.peer-check.outputs.peer_conflict != 'true'
      run: |
        npm run lint -- --fix || true
        npm run format || true
        npm run build || true
        npm test -- -u || true

    - name: Commit fixes if needed
      if: steps.peer-check.outputs.peer_conflict != 'true'
      run: |
        if [[ -n $(git status --porcelain) ]]; then
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "chore: auto-fix dependency update issues

          - Fix linting errors
          - Apply code formatting
          - Update any affected snapshots

          Co-authored-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push
        else
          echo "No fixes needed"
        fi

    - name: Close incompatible PR
      if: steps.peer-check.outputs.peer_conflict == 'true'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const pr = context.payload.pull_request;
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: pr.number,
            body: `This dependency update has peer dependency conflicts and cannot be automatically merged.\n\nPlease update related dependencies together or wait for compatible versions.\n\n<details><summary>Error details</summary>\n\n\`\`\`\n${require('fs').readFileSync('/tmp/npm-ci-output.txt', 'utf8').slice(-2000)}\n\`\`\`\n</details>`
          });
          await github.rest.pulls.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: pr.number,
            state: 'closed'
          });
