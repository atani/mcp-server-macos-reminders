name: Auto Merge Dependency Updates

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
  check_suite:
    types:
      - completed
  workflow_run:
    workflows: ["CI", "PR Checks"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only run for dependency update PRs
    if: |
      github.event.pull_request && (
        github.event.pull_request.user.login == 'dependabot[bot]' ||
        github.event.pull_request.user.login == 'app/dependabot' ||
        github.event.pull_request.user.login == 'renovate[bot]' ||
        github.event.pull_request.user.login == 'renovate-bot'
      )
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check PR status
        id: pr-status
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            // Get PR details
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });

            // Check if all required checks have passed
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pullRequest.head.sha
            });

            // Exclude our own workflow checks and skipped checks
            const selfWorkflows = ['auto-merge', 'auto-merge-security', 'auto-fix-deps', 'repair'];
            const relevantChecks = checkRuns.check_runs.filter(
              check => !selfWorkflows.includes(check.name) && check.conclusion !== 'skipped'
            );

            const allChecksPassed = relevantChecks.every(
              check => check.status === 'completed' &&
                (check.conclusion === 'success' || check.conclusion === 'neutral')
            );

            const pendingChecks = relevantChecks.filter(c => c.status !== 'completed');
            if (pendingChecks.length > 0) {
              console.log(`Pending checks: ${pendingChecks.map(c => c.name).join(', ')}`);
              core.setOutput('canMerge', false);
              return;
            }

            const failedChecks = relevantChecks.filter(
              c => c.conclusion !== 'success' && c.conclusion !== 'neutral'
            );
            if (failedChecks.length > 0) {
              console.log(`Failed checks: ${failedChecks.map(c => `${c.name}: ${c.conclusion}`).join(', ')}`);
            }

            console.log(`All checks passed: ${allChecksPassed}`);
            console.log(`PR mergeable_state: ${pullRequest.mergeable_state}`);

            core.setOutput('canMerge', allChecksPassed && pullRequest.mergeable_state === 'clean');

      - name: Auto-approve PR
        if: steps.pr-status.outputs.canMerge == 'true'
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR
        if: steps.pr-status.outputs.canMerge == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            
            // Enable auto-merge
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash'
              });
              console.log('PR merged successfully');
            } catch (error) {
              // If direct merge fails, try enabling auto-merge
              try {
                const mutation = `
                  mutation($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(input: {
                      pullRequestId: $pullRequestId,
                      mergeMethod: SQUASH
                    }) {
                      pullRequest {
                        autoMergeRequest {
                          enabledAt
                        }
                      }
                    }
                  }
                `;
                
                await github.graphql(mutation, {
                  pullRequestId: pr.node_id
                });
                console.log('Auto-merge enabled');
              } catch (graphqlError) {
                console.error('Failed to enable auto-merge:', graphqlError);
              }
            }

  # Additional job to handle security updates with higher priority
  auto-merge-security:
    runs-on: ubuntu-latest
    if: |
      (github.event.pull_request.user.login == 'dependabot[bot]' ||
        github.event.pull_request.user.login == 'app/dependabot' ||
       github.event.pull_request.user.login == 'renovate[bot]') &&
      contains(github.event.pull_request.labels.*.name, 'security')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Fast-track security updates
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            
            // Add priority label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['priority:high']
            });
            
            // Auto-approve security updates
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              event: 'APPROVE',
              body: '🔒 Auto-approved security update'
            });
            
            console.log('Security update fast-tracked');