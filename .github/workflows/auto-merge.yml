name: Auto Merge Dependency Updates

on:
  # Triggered when CI or PR Checks complete
  workflow_run:
    workflows: ["CI", "PR Checks"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only run when the triggering workflow succeeded
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Find dependabot PRs from workflow run
        id: find-pr
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = context.payload.workflow_run;

            // Get PRs associated with the workflow run
            const prs = run.pull_requests;
            if (!prs || prs.length === 0) {
              console.log('No PR associated with this workflow run');
              core.setOutput('found', false);
              return;
            }

            const pr = prs[0];
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });

            const botLogins = [
              'dependabot[bot]', 'app/dependabot',
              'renovate[bot]', 'renovate-bot'
            ];
            if (!botLogins.includes(pullRequest.user.login)) {
              console.log(`PR author ${pullRequest.user.login} is not a dependency bot`);
              core.setOutput('found', false);
              return;
            }

            console.log(`Found dependabot PR #${pr.number}: ${pullRequest.title}`);
            core.setOutput('found', true);
            core.setOutput('pr_number', pr.number);
            core.setOutput('head_sha', pullRequest.head.sha);
            core.setOutput('node_id', pullRequest.node_id);

      - name: Check all CI status
        if: steps.find-pr.outputs.found == 'true'
        id: check-status
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sha = '${{ steps.find-pr.outputs.head_sha }}';
            const prNumber = ${{ steps.find-pr.outputs.pr_number || 0 }};

            // Get all check runs for the PR head SHA
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha
            });

            // Exclude self-referential and skipped checks
            const excludeNames = [
              'auto-merge', 'auto-merge-security',
              'auto-fix-deps', 'repair'
            ];
            const relevant = checkRuns.check_runs.filter(
              c => !excludeNames.includes(c.name) && c.conclusion !== 'skipped'
            );

            const pending = relevant.filter(c => c.status !== 'completed');
            if (pending.length > 0) {
              console.log(`Still pending: ${pending.map(c => c.name).join(', ')}`);
              core.setOutput('ready', false);
              return;
            }

            const failed = relevant.filter(
              c => c.conclusion !== 'success' && c.conclusion !== 'neutral'
            );
            if (failed.length > 0) {
              console.log(`Failed: ${failed.map(c => `${c.name}(${c.conclusion})`).join(', ')}`);
              core.setOutput('ready', false);
              return;
            }

            // Check mergeable state
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const ready = pr.mergeable_state === 'clean' || pr.mergeable_state === 'unstable';
            console.log(`All ${relevant.length} checks passed, mergeable_state: ${pr.mergeable_state}`);
            core.setOutput('ready', ready);

      - name: Auto-approve PR
        if: steps.check-status.outputs.ready == 'true'
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.find-pr.outputs.pr_number }}

      - name: Merge PR
        if: steps.check-status.outputs.ready == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ steps.find-pr.outputs.pr_number }};
            const nodeId = '${{ steps.find-pr.outputs.node_id }}';

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash'
              });
              console.log(`PR #${prNumber} merged successfully`);
            } catch (error) {
              console.log(`Direct merge failed: ${error.message}`);
              try {
                await github.graphql(`
                  mutation($id: ID!) {
                    enablePullRequestAutoMerge(input: {
                      pullRequestId: $id,
                      mergeMethod: SQUASH
                    }) {
                      pullRequest { autoMergeRequest { enabledAt } }
                    }
                  }
                `, { id: nodeId });
                console.log(`Auto-merge enabled for PR #${prNumber}`);
              } catch (gqlError) {
                console.error('Failed to enable auto-merge:', gqlError.message);
              }
            }
